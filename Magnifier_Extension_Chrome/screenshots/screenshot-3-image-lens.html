<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot 3 – Image Magnification Lens</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{width:1280px;height:800px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#dee1e6}

.tab-strip{height:40px;background:#dee1e6;display:flex;align-items:flex-end;padding:0 0 0 72px}
.tab{height:32px;min-width:220px;background:#fff;border-radius:8px 8px 0 0;display:flex;align-items:center;padding:0 14px;gap:8px;font-size:12px;color:#333}
.tab-x{margin-left:auto;font-size:10px;color:#999}
.nav-bar{height:44px;background:#f1f3f4;display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid #e0e0e0}
.nav-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#555;font-size:14px;font-weight:bold;background:#e8eaed}
.address-bar{flex:1;height:32px;background:#fff;border-radius:16px;border:1px solid #dadce0;display:flex;align-items:center;padding:0 14px;gap:8px;font-size:13px;color:#333}
.ext-btn{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(59,130,246,.4)}

/* Page */
.page{height:716px;background:#1a1f2e;position:relative;overflow:hidden}

/* Gallery header */
.gallery-header{padding:28px 60px 20px;display:flex;align-items:center;justify-content:space-between}
.gallery-title{font-size:22px;font-weight:700;color:#f1f5f9}
.gallery-sub{font-size:13px;color:#64748b;margin-top:3px}
.gallery-btn{padding:8px 16px;background:linear-gradient(135deg,#1e3a8a,#312e81);border:1.5px solid #3b82f6;border-radius:8px;color:#bfdbfe;font-size:12px;font-weight:600}

/* Main landscape image */
.landscape{position:relative;margin:0 60px;border-radius:16px;overflow:hidden;height:440px}
.landscape svg{width:100%;height:100%}

/* Image caption strip */
.caption{padding:14px 60px 0;display:flex;justify-content:space-between;align-items:center}
.caption-text{font-size:13px;color:#64748b}
.caption-meta{font-size:12px;color:#334155}

/* Circular lens – positioned over the peaks/sky area */
.lens{
  position:absolute;
  left:560px;top:162px;
  width:240px;height:240px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.9);
  overflow:hidden;
  box-shadow:0 0 0 1.5px rgba(0,0,0,.25),0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.15);
  pointer-events:none;
}
/* Inside lens: same SVG but zoomed – use a scaled copy with svg viewBox trick */
.lens-inner{
  position:absolute;
  inset:0;
}
.lens-inner svg{
  width:600px;height:600px; /* 2.5x of 240 */
  position:absolute;
  /* shift so center of lens (560+120, 230+120)=(680,350) maps to (120,120) inside lens */
  /* SVG is for a 1160px wide image starting at left:60, top:128(header+gallery margin) in page */
  /* lens is at page(560,162+84browser=246), in .page at (560,162) */
  /* image in .page starts at (60, 68+20=88 from page top with header 68px) */
  /* approximate: shift the 600x600 svg so that page point (680, 282) lands at (120,120) inside lens */
  left:-480px;top:-345px;
}

/* Cursor to the right of lens */
.cursor{position:absolute;left:819px;top:273px;pointer-events:none}

/* Lens badge */
.lens-badge{
  position:absolute;left:560px;top:128px;
  background:linear-gradient(135deg,#1e3a8a,#312e81);
  color:#bfdbfe;font-size:11px;font-weight:600;
  padding:3px 10px;border-radius:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  letter-spacing:.3px;
}

/* Thumbnail strip at bottom */
.thumbs{position:absolute;bottom:0;left:0;right:0;padding:12px 60px;display:flex;gap:10px;background:linear-gradient(to top, rgba(10,12,20,.95), transparent)}
.thumb{width:110px;height:66px;border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,.08);flex-shrink:0}
.thumb.active{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.35)}
.thumb svg{width:110px;height:66px}
</style>
</head>

      <circle cx="760" cy="378" r="3" fill="#f472b6"/>
      <circle cx="820" cy="372" r="4" fill="#a78bfa"/>
      <circle cx="1000" cy="376" r="3" fill="#fbbf24"/>

    <!-- Circular lens overlay (over the main mountain + sky area) -->
    <div class="lens">
      <div class="lens-inner">
        <!-- Same SVG with adjusted position/scale to show zoomed area around (680,282) of original -->
        <svg viewBox="450 60 192 192" width="240" height="240" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <!-- Sky gradient -->
