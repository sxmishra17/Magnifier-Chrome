<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Extensions</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.7;padding:48px 20px}
.wrap{max-width:720px;margin:0 auto}
h1{font-size:32px;font-weight:800;margin-bottom:10px}
p{font-size:16px;color:#94a3b8;margin-bottom:18px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:22px 22px 18px}
.card h2{font-size:20px;margin-bottom:8px}
.links{margin-top:14px;display:flex;gap:12px;flex-wrap:wrap}
a{color:#93c5fd;text-decoration:none}
a:hover{text-decoration:underline}
.pill{display:inline-block;padding:8px 12px;border-radius:999px;background:#1e293b;border:1px solid #334155}
</style>
</head>
<body>
<div class="wrap">
  <h1>Browser Extensions</h1>
  <p>Published resources for projects in this repository.</p>

  <div class="card">
    <h2>Magnifier Extension</h2>
    <p>Hover zoom lens for text, images, and PDFs in Chrome.</p>
    <div class="links">
      <a class="pill" href="privacy-policy.html">Privacy Policy</a>
      <a class="pill" href="https://github.com/sxmishra17/Browser-Extensions/tree/main/Magnifier_Extension_Chrome">Project Folder</a>
    </div>
  </div>
</div>
</body>
</html>
