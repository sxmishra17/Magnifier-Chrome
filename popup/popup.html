<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magnifier</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 48 48" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="13" stroke="url(#g1)" stroke-width="4"/>
        <line x1="30" y1="30" x2="42" y2="42" stroke="url(#g2)" stroke-width="4" stroke-linecap="round"/>
        <defs>
          <linearGradient id="g1" x1="7" y1="7" x2="33" y2="33" gradientUnits="userSpaceOnUse">
            <stop stop-color="#60a5fa"/>
            <stop offset="1" stop-color="#a78bfa"/>
          </linearGradient>
          <linearGradient id="g2" x1="30" y1="30" x2="42" y2="42" gradientUnits="userSpaceOnUse">
            <stop stop-color="#a78bfa"/>
            <stop offset="1" stop-color="#6d28d9"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="title-block">
      <h1>Magnifier</h1>
      <span class="subtitle">Hover to magnify</span>
    </div>
    <label class="toggle" title="Enable / Disable magnifier">
      <input type="checkbox" id="enableToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">
      <span>Zoom Level</span>
      <span class="value-badge" id="zoomBadge">3×</span>
    </div>
    <input type="range" id="zoomSlider" min="1" max="10" step="0.5" value="3" />
    <div class="range-labels">
      <span>1×</span>
      <span>5×</span>
      <span>10×</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">
      <span>Lens Size</span>
      <span class="value-badge" id="sizeBadge">Medium</span>
    </div>
    <input type="range" id="sizeSlider" min="1" max="3" step="1" value="2" />
    <div class="range-labels">
      <span>Small</span>
      <span>Medium</span>
      <span>Large</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label"><span>Lens Shape</span></div>
    <div class="lens-options">
      <label class="lens-option" id="opt-circle">
        <input type="radio" name="lensShape" value="circle" />
        <div class="shape-preview circle-shape"></div>
        <span>Circle</span>
      </label>
      <label class="lens-option" id="opt-rect">
        <input type="radio" name="lensShape" value="rect" />
        <div class="shape-preview rect-shape"></div>
        <span>Rectangle</span>
      </label>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label"><span>Lens Position</span></div>
    <div class="pos-grid">
      <span class="pos-empty"></span>
      <label class="pos-option" title="Above cursor">
        <input type="radio" name="lensPos" value="up" />
        <span class="pos-icon">&#8593;</span>
      </label>
      <span class="pos-empty"></span>
      <label class="pos-option" title="Left of cursor">
        <input type="radio" name="lensPos" value="left" />
        <span class="pos-icon">&#8592;</span>
      </label>
      <label class="pos-option" title="Centered on cursor">
        <input type="radio" name="lensPos" value="center" />
        <span class="pos-icon">&#8857;</span>
      </label>
      <label class="pos-option" title="Right of cursor">
        <input type="radio" name="lensPos" value="right" />
        <span class="pos-icon">&#8594;</span>
      </label>
      <span class="pos-empty"></span>
      <label class="pos-option" title="Below cursor">
        <input type="radio" name="lensPos" value="down" />
        <span class="pos-icon">&#8595;</span>
      </label>
      <span class="pos-empty"></span>
    </div>
  </div>

  <div class="footer">
    <button id="openPdfViewer" class="pdf-button" type="button">Open PDF Viewer</button>
    <span>Settings are saved automatically</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
